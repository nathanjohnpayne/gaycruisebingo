<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <meta name="theme-color" content="#07060d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- iOS home-screen label. Safari reads this, not the manifest's short_name
         (which Android uses, and which is deliberately shorter — #364), so the
         two platforms are set independently. Without this tag iOS would fall
         back to <title>, which happens to match today; it is set explicitly so
         retitling the page cannot silently rename the installed icon. -->
    <meta name="apple-mobile-web-app-title" content="Gay Cruise Bingo" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <title>Gay Cruise Bingo</title>
    <meta name="description" content="Live multiplayer bingo for the high seas. Trieste to Barcelona, July 2026." />

    <!-- Static default Open Graph for bare-URL unfurl (ADR 0005). No server-rendered
         per-share images — Share Cards are generated on-device (#36) and handed to
         the native share sheet instead. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Gay Cruise Bingo" />
    <meta property="og:title" content="Gay Cruise Bingo" />
    <meta property="og:description" content="Sign in, get your card, mark it if you see it." />
    <meta property="og:url" content="https://gaycruisebingo.com/" />
    <!-- og:image is served from the always-healthy web.app host, not the apex:
         the apex custom domain TLS-resets for link crawlers (#340), which is
         exactly the fetch iMessage/WhatsApp/Telegram make to build a preview,
         and it is SNI-blocked on the ship network the app is used from (#164).
         og:url stays the canonical apex on purpose. Revisit the og:image host
         once the apex data plane is verified healed (#338 / #340). -->
    <meta property="og:image" content="https://gaycruisebingo.web.app/og-default.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="2400" />
    <meta property="og:image:height" content="1260" />
    <meta property="og:image:alt" content="Gay Cruise Bingo—a marked-up live multiplayer bingo card for the July 2026 sailing, Trieste to Barcelona" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://gaycruisebingo.web.app/og-default.png" />
    <meta name="robots" content="noindex" />
    <!-- Inline on purpose: this paints before newly deployed hashed assets load. -->
    <style>
      html, body, #root { margin: 0; min-height: 100%; }
      html, body { background: #07060d; }
      .boot-loader {
        min-height: 100vh; display: grid; place-content: center; gap: 14px;
        color: #cfc7e8; background: #07060d; text-align: center;
        font: 600 15px/1.2 system-ui, sans-serif; letter-spacing: 0.04em;
      }
      .boot-loader-dots { display: flex; justify-content: center; gap: 7px; }
      .boot-loader-dots i {
        width: 9px; height: 9px; border-radius: 50%; background: #ff2d9b;
        animation: boot-pulse 1s ease-in-out infinite;
      }
      .boot-loader-dots i:nth-child(2) { animation-delay: 0.15s; }
      .boot-loader-dots i:nth-child(3) { animation-delay: 0.3s; }
      @keyframes boot-pulse {
        0%, 100% { opacity: 0.35; transform: scale(0.75); }
        50% { opacity: 1; transform: scale(1.15); }
      }
      @media (prefers-reduced-motion: reduce) {
        .boot-loader-dots i { animation: none; opacity: 0.8; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-loader" role="status" aria-live="polite">
        <span class="boot-loader-dots" aria-hidden="true"><i></i><i></i><i></i></span>
        <span>Opening your bingo card…</span>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
