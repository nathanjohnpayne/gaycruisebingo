# .repo-template.yml
#
# Per-repo overrides for CI lint scripts under scripts/ci/. Read by:
#   - scripts/ci/check_spec_test_alignment
#
# Keep this file small and only add entries when the default conventions
# (filename match of test against spec basename) don't cover the case.

# Map each spec_id (frontmatter or basename) to one or more test files.
# Used by check_spec_test_alignment when the default filename search
# wouldn't find the test.
spec_test_map:
  # The test-harness spec spans four layers whose test filenames don't share
  # the spec basename, so map each layer's test explicitly.
  w0-test-harness:
    - src/game/logic.test.ts
    - src/test/rtl-smoke.test.tsx
    - tests/rules/firestore-harness.test.ts
    - tests/e2e/smoke.spec.ts
  # d15-day-switcher's coverage is component-named, not spec-basename-named
  # (the ticket's own "Tests to add" list), so map both explicitly.
  d15-day-switcher:
    - src/components/DaySwitcher.test.tsx
    - src/components/Board.test.tsx
  # d15-tutorial-banners's coverage is component-named, not spec-basename-
  # named (the spec's own "Test coverage" list), so map all three explicitly.
  d15-tutorial-banners:
    - src/components/TutorialBanner.test.tsx
    - src/components/DaySwitcher.test.tsx
    - src/components/Board.test.tsx
  # d15-text-size's coverage is feature-named per the ticket's own "Tests to
  # add" list (#215), not spec-basename-named, so map all four explicitly.
  d15-text-size:
    - src/game/fitText.test.ts
    - src/hooks/useTextSize.test.ts
    - src/components/Board.test.tsx
    - src/w2-ga4-events.test.tsx
  # d15-coach-overlay's coverage spans two files neither named for the spec.
  d15-coach-overlay:
    - src/components/CoachOverlay.test.tsx
    - src/components/d15-more-menu.test.tsx
  # d15-admin-proof-claims's coverage extends the existing Admin.test.tsx
  # (component-named, not spec-basename-named — the ticket's own "Tests to
  # add" list), so map it explicitly.
  d15-admin-proof-claims:
    - src/components/Admin.test.tsx
  # easy-mix spans the pure composition (game logic) and the scheduler/snapshot
  # side (a differently-named functions test), so map both explicitly.
  easy-mix:
    - src/game/easy-mix.test.ts
    - tests/functions/easy-mix-snapshot.test.ts
# Glob patterns that identify test files. Supplements the default
# ("tests/**/*.test.*") which doesn't cover shell-based tests or the
# Vite app's colocated unit tests under src/.
test_globs:
  - "tests/**"
  - "src/**/*.test.*"

# Top-level directories beyond the canonical set that are intentional in
# this repo: the Vite app's static-assets dir. Justification per the Code
# Modification Rules lives in plans/app-scaffold-dirs.md (this whitelist
# only silences the lint gate). `cloud-run` was dropped from this list when
# #39 (ADR 0005) removed the Cloud Run OG renderer, the directory's only
# occupant.
# Inline-array form because check_no_forbidden_top_level_dirs only
# recognizes `key: [a, b]`, not indented list items.
extra_top_level_dirs: [public]
