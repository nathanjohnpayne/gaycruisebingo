<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gay Cruise Bingo</title>
    <meta name="description" content="A bingo web app to play with your friends on a gay cruise." />
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; margin: 0; }
      body {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 2rem;
        text-align: center;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: linear-gradient(135deg, #e40303, #ff8c00, #ffed00, #008026, #004dff, #750787);
        background-size: 300% 300%;
        animation: drift 18s ease infinite;
      }
      @keyframes drift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      main { max-width: 34rem; text-shadow: 0 1px 12px rgba(0, 0, 0, 0.35); }
      .badge { font-size: clamp(3rem, 12vw, 6rem); }
      h1 { font-size: clamp(2rem, 7vw, 3.5rem); letter-spacing: -0.02em; margin: 0.25rem 0; }
      p { font-size: clamp(1rem, 3.5vw, 1.25rem); opacity: 0.95; margin-top: 0.5rem; }
      .soon {
        margin-top: 1.5rem;
        display: inline-block;
        padding: 0.5rem 1.1rem;
        border: 2px solid rgba(255, 255, 255, 0.6);
        border-radius: 999px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="badge">🌈🚢</div>
      <h1>Gay Cruise Bingo</h1>
      <p>A bingo web app to play with your friends on a gay cruise.</p>
      <span class="soon">Coming soon</span>
    </main>
  </body>
</html>
