name: synthetic-uptime

# Scheduled synthetic that asserts the DEPLOYED app actually mounts and renders
# its root — not merely that Firebase Hosting returns 200 for the shell (issue
# #142). The 2026-07-09 outage (#141) was invisible to a 200-only check: the
# shell + <title> loaded (200 OK) and only the client JS crashed on init
# (auth/invalid-api-key), leaving a blank page. This catches an outage from ANY
# cause (bad deploy, rotated key, rules regression that blocks first paint), not
# just a deploy — the post-deploy gate in scripts/deploy.sh covers the deploy
# path. It is load-and-assert only (tests/synthetic/app-mounts.spec.ts): it never
# signs in or writes, so it creates no Auth/Firestore/Storage side effects.
#
# Failures surface as: a red workflow run, GitHub's scheduled-failure email, AND
# a single deduplicated tracking issue (opened on first failure, commented on
# continued failure, auto-closed on recovery).

on:
  schedule:
    - cron: '*/15 * * * *' # every 15 minutes
  workflow_dispatch: {}

# Prevent overlapping runs from racing on the tracking issue.
concurrency:
  group: synthetic-uptime
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

env:
  SYNTHETIC_URL: https://gaycruisebingo.com/
  ISSUE_TITLE: 'Synthetic uptime check failing: the app is not mounting'
  ISSUE_LABEL: synthetic-uptime

jobs:
  synthetic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run synthetic (assert the app mounts)
        id: synthetic
        continue-on-error: true
        run: npm run test:synthetic

      # On FAILURE: open the tracking issue if none is open, else add a comment
      # to the existing one — so a continued outage stays a single issue.
      # Deduped by the ISSUE_LABEL (exact), which is created idempotently first.
      - name: Open or update failure issue
        if: steps.synthetic.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          gh label create "$ISSUE_LABEL" --repo "$GITHUB_REPOSITORY" \
            --color B60205 --description "Synthetic uptime check failure" --force
          existing="$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
            --label "$ISSUE_LABEL" --json number --jq '.[0].number // empty')"
          body="$(printf 'The synthetic uptime check failed — the deployed app did not mount cleanly at %s (blank page, a Firebase init error such as auth/invalid-api-key, or an uncaught exception on load).\n\nRun: %s\n\nIf this is a real outage, roll back per DEPLOYMENT.md § Rollback Procedure. This issue auto-closes when a later run passes.' "$SYNTHETIC_URL" "$RUN_URL")"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" --body "Still failing. $body"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "$ISSUE_TITLE" --label "$ISSUE_LABEL" --body "$body"
          fi

      # On SUCCESS: if a tracking issue is open, comment recovery and close it.
      - name: Close failure issue on recovery
        if: steps.synthetic.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          existing="$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
            --label "$ISSUE_LABEL" --json number --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            gh issue close "$existing" --repo "$GITHUB_REPOSITORY" \
              --reason completed \
              --comment "Recovered — the app mounts again. Run: ${RUN_URL}"
          fi

      # Make the run itself red so the Actions view and the scheduled-failure
      # email reflect the outage even though the issue step ran.
      - name: Reflect synthetic result in job status
        if: steps.synthetic.outcome == 'failure'
        run: |
          echo "Synthetic check failed — see the tracking issue and the step log above." >&2
          exit 1
