name: app-ci

# Runs the app test harness on every PR and on pushes to main: typecheck, the
# jsdom unit/component suite, the production build, the Cloud Functions notifier
# suite (tests/functions/), and the Firestore/Storage security-rules suite
# against the emulators. The Playwright e2e layer is a local smoke runner
# (`npm run test:e2e`) and is intentionally not run here.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: app-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  app-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit + component tests (jsdom)
        run: npm test

      - name: Build
        run: npm run build

      # The Cloud Functions notifier suite (tests/functions/) imports
      # functions/src, whose resend / firebase-admin deps live only in
      # functions/package.json. `test:functions` runs `npm --prefix functions
      # install` first, so it is self-contained on a clean runner (no emulator).
      - name: Functions notifier tests
        run: npm run test:functions

      # The Firestore emulator is a Java process; rules tests boot it via
      # `firebase emulators:exec`. Java comes from setup-java; the Firebase
      # CLI is a devDependency (firebase-tools), so the `npm ci` above already
      # put the `firebase` binary on npm's script PATH.
      - name: Set up Java (Firestore emulator runtime)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Firestore rules tests (emulator)
        run: npm run test:rules
