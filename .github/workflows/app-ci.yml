name: app-ci

# Runs the app test harness on every PR and on pushes to main: typecheck, the
# jsdom unit/component suite, the production build, and the Firestore/Storage
# security-rules suite against the emulators. The Playwright e2e layer is a
# local smoke runner (`npm run test:e2e`) and is intentionally not run here.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: app-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  app-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit + component tests (jsdom)
        run: npm test

      - name: Build
        run: npm run build

      # The Firestore emulator is a Java process; rules tests boot it via
      # `firebase emulators:exec`, so Java + the Firebase CLI must be present.
      - name: Set up Java (Firestore emulator runtime)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Firestore rules tests (emulator)
        run: npm run test:rules
