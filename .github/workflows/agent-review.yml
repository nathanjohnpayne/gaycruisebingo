# Note: CodeRabbit (Phase 2.5) is handled by the CodeRabbit GitHub App
# and does not require a CI workflow step. It runs automatically when
# installed on the repo. See .github/review-policy.yml for enablement.
name: Agent Review Pipeline

on:
  pull_request:
    # `synchronize` (every push on an open PR) is in the list so
    # `load-config` re-parses `.github/review-policy.yml` on every
    # commit, not just on `opened` / `ready_for_review`. Without it,
    # a shell-parser regression can land on main and only surface
    # weeks later when the next PR happens to be opened. See #59.
    # `reopened` is included so the auto-merge re-arm path (#495) actually
    # fires: the job `if:` matches `synchronize || reopened`, but a reopened
    # event only reaches this workflow if it is subscribed here.
    # `unlabeled` is the #620 re-arm: on an over-threshold PR with a
    # carried-over approval, update-branch makes triage re-apply
    # needs-external-review, the label re-verify inside auto-merge sees it
    # and hard-fails (correctly), and auto-clear removes the label moments
    # later once the clearance gate passes — with no trigger on the removal,
    # the PR sat CLEAN-but-unmerged until a human reran the failed job.
    types: [opened, ready_for_review, labeled, synchronize, reopened, unlabeled]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Read review-policy.yml configuration
  # ──────────────────────────────────────────────
  load-config:
    # Runs on opened, ready_for_review, synchronize, and reopened so the
    # parser exercises every commit pushed to an open PR, not just
    # initial open. `reopened` is included for the #495 re-arm path: a PR
    # changed while closed and then reopened must have its policy
    # re-parsed here BEFORE the auto-merge re-arm evaluates, so the
    # threshold/paths feeding triage reflect the changed diff rather than
    # a stale snapshot. Explicitly excludes `labeled`: the `assign` job
    # allows `labeled` as a trigger, and it depends on this job's
    # outputs — letting load-config run on labeled would cause
    # assign to re-fire on every label edit and re-request
    # reviewers who have already reviewed. Downstream jobs keep
    # their own action-specific guards; triage intentionally runs on
    # synchronize/reopened for the auto-merge re-arm path while assign
    # stays scoped to opened/ready/labeled. See #59 for the
    # SKIPPED-as-SUCCESS miss this
    # closes and Codex's P2 on PR #131 for why labeled is excluded.
    # #557: ALSO run on approved pull_request_review events. The
    # auto-merge-on-approval registered-reviewer gate (require_approval)
    # reads needs.load-config.outputs.reviewers on the direct-approval
    # path; if load-config is skipped on review events that list is empty,
    # the gate defaults REVIEWERS_JSON to [], rejects every approver as
    # "not a registered reviewer", and never arms auto-merge (the merge
    # still backstops via merge-clearance-gate, but the convenience #544
    # added — and the one-shot-arming gap #495 closed — regress). This job
    # only reads the static review-policy.yml, so it is event-shape-agnostic.
    if: >
      (github.event_name == 'pull_request' &&
       (github.event.action == 'opened' ||
        github.event.action == 'ready_for_review' ||
        github.event.action == 'synchronize' ||
        github.event.action == 'reopened' ||
        github.event.action == 'unlabeled')) ||
      (github.event_name == 'pull_request_review' &&
       github.event.review.state == 'approved')
    runs-on: ubuntu-latest
    outputs:
      threshold: ${{ steps.config.outputs.threshold }}
      paths: ${{ steps.config.outputs.paths }}
      reviewers: ${{ steps.config.outputs.reviewers }}
      author_identity: ${{ steps.config.outputs.author_identity }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Explicit-token gh / github-script only, no authenticated git, so
          # don't leave the checkout token in .git/config (#548 / Codex #550).
          persist-credentials: false

      - name: Parse review-policy.yml
        id: config
        run: |
          CONFIG=".github/review-policy.yml"
          if [ ! -f "$CONFIG" ]; then
            echo "ERROR: $CONFIG not found"
            exit 1
          fi

          THRESHOLD=$(grep 'external_review_threshold:' "$CONFIG" | awk '{print $2}')
          echo "threshold=$THRESHOLD" >> "$GITHUB_OUTPUT"

          # Extract external_review_paths as a JSON array. Delegates to
          # scripts/workflow/parse_policy_list.sh (unit-tested by
          # scripts/ci/check_workflow_parsers — see #57). History: the
          # earlier inline `awk '/^key:/,/^[^ ]/'` range parser silently
          # dropped all list entries because the range-start pattern
          # also matched the range-end condition; see #54.
          #
          # `jq -c` (compact) is required here: multi-line JSON cannot
          # be written via the `key=value` GITHUB_OUTPUT format. Before
          # #54 fixed the awk extractor, PATHS was always `[]` (single-
          # line) so this latent bug was hidden; PR #58 / #30 tripped it.
          PATHS=$(bash scripts/workflow/parse_policy_list.sh "$CONFIG" external_review_paths \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "paths=$PATHS" >> "$GITHUB_OUTPUT"

          # Extract available_reviewers as a JSON array via the same
          # extracted parser. Before #54 this was always `[]`, which
          # silently broke the assign step's reviewer lookup.
          REVIEWERS=$(bash scripts/workflow/parse_policy_list.sh "$CONFIG" available_reviewers \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "reviewers=$REVIEWERS" >> "$GITHUB_OUTPUT"

          AUTHOR=$(grep 'author_identity:' "$CONFIG" | awk '{print $2}')
          echo "author_identity=${AUTHOR:-nathanjohnpayne}" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────
  # Job 2: Auto-label PRs that need external review
  # ──────────────────────────────────────────────
  triage:
    needs: [load-config]
    # `synchronize` / `reopened` are included alongside
    # opened/ready_for_review so any push-triggered auto-merge re-arm gets
    # threshold and protected-path labels (`needs-external-review`)
    # REFRESHED against the changed diff before it evaluates. Without this,
    # an originally-under-threshold PR whose later push or closed-state
    # change crossed the threshold (or touched a protected path) could
    # re-arm on a stale/missing label snapshot. Mirrors load-config, which
    # also handles synchronize/reopened so this job's threshold/paths inputs
    # are freshly parsed.
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      (github.event.action == 'opened' ||
       github.event.action == 'ready_for_review' ||
       github.event.action == 'synchronize' ||
       github.event.action == 'reopened')
    runs-on: ubuntu-latest
    outputs:
      needs_external: ${{ steps.check.outputs.needs_external }}
    steps:
      - name: Checkout trusted workflow helpers
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # This job shells out only to trusted default-branch helpers; never
          # run helper code from the PR head under the label-writing PAT.
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Evaluate PR against review-policy.yml
        id: check
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          THRESHOLD: ${{ needs.load-config.outputs.threshold }}
          PROTECTED_PATHS: ${{ needs.load-config.outputs.paths }}
          GH_TOKEN: ${{ secrets.REVIEWER_ASSIGNMENT_TOKEN }}
        with:
          github-token: ${{ secrets.REVIEWER_ASSIGNMENT_TOKEN }}
          script: |
            const childProcess = require('child_process');
            const fs = require('fs');
            const os = require('os');
            const path = require('path');
            const pr = context.payload.pull_request;
            const threshold = parseInt(process.env.THRESHOLD, 10);
            const protectedPaths = JSON.parse(process.env.PROTECTED_PATHS);

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
              }
            );

            // Exclude lockfiles, minified, and generated files from line count
            // to match REVIEW_POLICY.md threshold definition
            const excludePatterns = [
              /\.lock$/, /lock\.json$/, /\.min\.js$/, /\.min\.css$/,
              /\.generated\./, /\.g\.dart$/, /\.freezed\.dart$/,
            ];
            const countedFiles = files.filter(
              f => !excludePatterns.some(p => p.test(f.filename))
            );
            const totalChanges = countedFiles.reduce(
              (sum, f) => sum + f.additions + f.deletions, 0
            );

            // Convert glob patterns to regex for matching
            function globToRegex(pattern) {
              let re = pattern
                .replace(/\./g, '\\.')
                .replace(/\*\*/g, '___GLOBSTAR___')
                .replace(/\*/g, '[^/]*')
                .replace(/___GLOBSTAR___/g, '.*');
              return new RegExp('^' + re + '$');
            }

            const touchesProtected = files.some(f =>
              protectedPaths.some(p => globToRegex(p).test(f.filename))
            );

            // Use >= to match REVIEW_POLICY.md definition
            let needsExternal = totalChanges >= threshold || touchesProtected;
            let externalReviewFingerprint = '';
            let filesPath = '';
            const repo = `${context.repo.owner}/${context.repo.repo}`;
            try {
              filesPath = path.join(os.tmpdir(), `mergepath-pr-${pr.number}-files.json`);
              fs.writeFileSync(filesPath, JSON.stringify(files));
              const fingerprintRaw = childProcess.execFileSync(
                'bash',
                [
                  'scripts/workflow/external_review_fingerprint.sh',
                  '--repo', repo,
                  '--pr', String(pr.number),
                  '--ref', pr.head.sha,
                  '--config', '.github/review-policy.yml',
                  '--files-json', filesPath,
                ],
                {encoding: 'utf8', env: process.env}
              );
              const fingerprint = JSON.parse(fingerprintRaw);
              needsExternal = Boolean(fingerprint.requires_review);
              externalReviewFingerprint = fingerprint.fingerprint || '';
            } catch (e) {
              core.warning(
                `External-review fingerprint calculation failed; ` +
                `labeling fail-closed (${e.message}).`
              );
              needsExternal = true;
              externalReviewFingerprint = '';
            }

            // PROPAGATION-LANE-DEFER (#656): this job and pr-review-policy.yml's
            // External Review Check both decide needs-external-review, but only
            // the latter BYTE-VERIFIES a mergepath-sync/ PR against
            // mergepath@<sha> and exempts a faithful mirror (removing the
            // label + posting a github-actions[bot] comment with the
            // HEAD-PINNED marker `mergepath-propagation-lane
            // verified-head=<sha>`). Pre-#656, this job re-added the label on
            // any later event because it never consulted that verdict —
            // stranding approved, byte-verified sync PRs on Label Gate
            // (tadlockpsychiatry#93: lane-cleared 14:55, triage re-added
            // 15:46, stuck).
            //
            // Fix: SKIP the label add ONLY when the lane has already verified
            // THIS exact head — i.e. a github-actions[bot]-authored comment
            // carries the marker pinned to pr.head.sha. Everything else stays
            // FAIL-CLOSED: an unverified sync head (fresh push, diverged
            // hand-edit, reopened-with-new-head) is labeled here exactly as
            // before, and the lane later removes the label if and only if the
            // byte-compare passes. This preserves the PAT-driven label
            // add/remove events that re-arm the downstream gates, and it
            // grants no exemption this job derives itself — the lane's
            // byte-verify remains the sole teeth. (The naive alternative —
            // skipping by branch name — was rejected as fail-OPEN in the
            // closed first attempt: Codex P1 on the #657 PR.)
            //
            // Marker contract + trust model are shared with
            // scripts/merge-clearance-gate.sh lane_verified() (#620): only
            // repo workflows author github-actions[bot] comments, and only
            // pr-review-policy.yml posts this marker, only after
            // verify-propagation-pr.sh byte-confirms the head. Keep the
            // marker string in lockstep across the three files
            // (scripts/ci/check_agent_review_triage_defers asserts it).
            // The branch-prefix pre-filter must match SYNC_BRANCH_PREFIX in
            // scripts/sync-to-downstream.sh; it only bounds the extra API
            // read to sync branches — the marker, not the branch name, is
            // what authorizes the skip.
            let laneVerifiedHead = false;
            if (needsExternal &&
                ((pr.head && pr.head.ref) || '').startsWith('mergepath-sync/')) {
              try {
                const comments = await github.paginate(
                  github.rest.issues.listComments,
                  {
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: pr.number,
                    per_page: 100,
                  }
                );
                const marker = `mergepath-propagation-lane verified-head=${pr.head.sha}`;
                laneVerifiedHead = comments.some(
                  c => c.user && c.user.login === 'github-actions[bot]' &&
                       (c.body || '').includes(marker)
                );
              } catch (e) {
                // Indeterminate marker read must not skip labeling — mirror
                // lane_verified()'s fail-safe direction (external review can
                // only be ADDED by an uncertain read, never removed).
                core.warning(`Propagation-lane marker read failed (${e.message}); labeling fail-closed.`);
                laneVerifiedHead = false;
              }
            }

            if (needsExternal && laneVerifiedHead) {
              console.log(
                `Propagation lane already byte-verified head ${pr.head.sha} ` +
                `(github-actions[bot] verified-head marker present) — skipping ` +
                `needs-external-review add; the lane owns this PR's labeling.`
              );
            } else if (needsExternal) {
              let carried = false;
              try {
                if (needsExternal && externalReviewFingerprint && filesPath) {
                  const carryRaw = childProcess.execFileSync(
                    'bash',
                    [
                      'scripts/workflow/external_review_carryforward.sh',
                      '--repo', repo,
                      '--pr', String(pr.number),
                      '--head', pr.head.sha,
                      '--current-fingerprint', externalReviewFingerprint,
                      '--config', '.github/review-policy.yml',
                      '--files-json', filesPath,
                    ],
                    {encoding: 'utf8', env: process.env}
                  );
                  const carry = JSON.parse(carryRaw);
                  carried = Boolean(carry.carried);
                  if (carried) {
                    needsExternal = false;
                    console.log(
                      `Codex already cleared the same external-review fingerprint ` +
                      `on ${carry.source_commit} at ${carry.source_time}; skipping ` +
                      `needs-external-review on base-only sync (#705).`
                    );
                  }
                }
              } catch (e) {
                core.warning(
                  `External-review fingerprint carry-forward check failed; ` +
                  `labeling fail-closed using threshold/protected-path result (${e.message}).`
                );
              }

              if (!carried && needsExternal) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  labels: ['needs-external-review'],
                });
              }
            }

            core.setOutput('needs_external', needsExternal.toString());

  # ──────────────────────────────────────────────
  # Job 3: Assign reviewer (internal self-peer review)
  # ──────────────────────────────────────────────
  assign:
    needs: [load-config, triage]
    if: >
      always() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      (github.event.action == 'opened' || github.event.action == 'ready_for_review' || github.event.action == 'labeled')
    runs-on: ubuntu-latest
    steps:
      - name: Assign reviewer identity based on Authoring-Agent
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          AUTHOR_IDENTITY: ${{ needs.load-config.outputs.author_identity }}
          REVIEWERS_JSON: ${{ needs.load-config.outputs.reviewers }}
        with:
          github-token: ${{ secrets.REVIEWER_ASSIGNMENT_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;
            const authorIdentity = process.env.AUTHOR_IDENTITY || 'nathanjohnpayne';
            const reviewers = JSON.parse(process.env.REVIEWERS_JSON || '[]');

            // Under the new policy, all PRs are authored by the author identity.
            if (author !== authorIdentity) {
              console.log(`Author ${author} is not ${authorIdentity}; skipping auto-assignment.`);
              return;
            }

            if (reviewers.length === 0) {
              console.log('No reviewers configured in review-policy.yml');
              return;
            }

            // Read the Authoring-Agent line from the PR body to determine which
            // agent wrote the code. Per REVIEW_POLICY.md, the same agent reviews
            // under its own reviewer identity (e.g., claude → nathanpayne-claude).
            const body = pr.body || '';
            const agentMatch = body.match(/^Authoring-Agent:\s*(\w+)/mi);
            let reviewer;

            if (agentMatch) {
              const agentName = agentMatch[1].toLowerCase();
              const matchingReviewer = reviewers.find(
                r => r.endsWith(`-${agentName}`)
              );
              if (matchingReviewer) {
                reviewer = matchingReviewer;
                console.log(`Authoring-Agent: ${agentName} → assigning ${reviewer}`);
              } else {
                console.log(`Authoring-Agent: ${agentName} has no matching reviewer identity, using first available.`);
                reviewer = reviewers[0];
              }
            } else {
              console.log('No Authoring-Agent line found in PR body; assigning first available reviewer.');
              reviewer = reviewers[0];
            }

            const { data: existingReviewers } = await github.rest.pulls.listRequestedReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });
            const alreadyRequested = existingReviewers.users.map(u => u.login);

            if (!alreadyRequested.includes(reviewer)) {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                reviewers: [reviewer],
              });
              console.log(`Assigned ${reviewer} for internal self-peer review.`);
            }

  # Note: no CI-side invoke-reviewer job exists. Phase 2 internal
  # self-peer review is performed by the authoring agent in its own
  # session — the agent switches its identity to its reviewer account
  # (e.g., nathanpayne-claude) via a PAT from 1Password and posts the
  # review with that PAT. See REVIEW_POLICY.md § Phase 2 and CLAUDE.md
  # "After opening the PR" steps 4–7. A headless Claude/Codex CLI
  # invocation in CI is intentionally NOT used: it (a) bypasses the
  # in-session tool context the agent already has, (b) adds a stale
  # API-key failure surface unrelated to the PR, and (c) duplicates
  # work the agent is already doing as part of the PR loop.

  # ──────────────────────────────────────────────
  # Job 4: Detect agent disagreement → escalate
  # ──────────────────────────────────────────────
  detect-disagreement:
    if: github.event_name == 'pull_request_review'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Explicit-token gh / github-script only, no authenticated git, so
          # don't leave the checkout token in .git/config (#548 / Codex #550).
          persist-credentials: false

      - name: Install js-yaml
        run: npm install --no-save --ignore-scripts --legacy-peer-deps js-yaml

      - name: Check for conflicting reviews
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.REVIEWER_ASSIGNMENT_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const yaml = require('js-yaml');

            // Decision logic lives in scripts/disagreement-detector.cjs
            // so the workflow and the fixture-driven test
            // (scripts/ci/check_disagreement_detector) exercise the
            // exact same code. See #259 for the regression this
            // factoring closes.
            const { decide } = require(
              path.resolve(process.env.GITHUB_WORKSPACE, 'scripts/disagreement-detector.cjs')
            );

            let reviewerAccounts;
            try {
              const config = yaml.load(fs.readFileSync('.github/review-policy.yml', 'utf8'));
              reviewerAccounts = config.available_reviewers || [];
            } catch (e) {
              reviewerAccounts = ['nathanpayne-claude', 'nathanpayne-codex', 'nathanpayne-cursor'];
            }

            // Paginate reviews — long histories (>30) otherwise truncate and
            // mask the latest-on-HEAD signal. Mirrors the pagination
            // fix in pr-audit.yml (PR #255 P2).
            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
              }
            );

            // Check if the label is currently applied
            const labels = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const hasLabel = labels.data.some(l => l.name === 'needs-human-review');

            const decision = decide({
              reviews,
              reviewerAccounts,
              headSha: context.payload.pull_request.head.sha,
              hasLabel,
            });

            if (decision === 'apply') {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: ['needs-human-review'],
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: '**Agent disagreement detected.** One reviewer approved and another requested changes on the current HEAD. Escalating to @nathanjohnpayne for human tiebreaker per REVIEW_POLICY.md.',
              });
            } else if (decision === 'remove') {
              // No live disagreement on the current HEAD — remove the
              // label. Covers the #259 case: a stale CHANGES_REQUESTED
              // on an older SHA is superseded by an APPROVED on HEAD.
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  name: 'needs-human-review',
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  body: '**Agent disagreement resolved.** No live conflict on the current HEAD (latest review per reviewer, non-DISMISSED, commit_id == HEAD). Removing `needs-human-review` label.',
                });
              } catch (e) {
                // Label may already be removed — ignore 404
                if (e.status !== 404) throw e;
              }
            }
            // decision === 'noop' — nothing to do.

  # ──────────────────────────────────────────────
  # Job 5: Block self-approval
  # ──────────────────────────────────────────────
  block-self-approval:
    if: >
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    steps:
      - name: Dismiss self-approval from reviewer bot accounts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Explicit-token github-script only, no authenticated git, so don't
          # leave the checkout token in .git/config (#548 / Codex #550).
          persist-credentials: false

      - name: Install js-yaml
        run: npm install --no-save --ignore-scripts --legacy-peer-deps js-yaml

      - name: Check and dismiss
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.REVIEWER_ASSIGNMENT_TOKEN }}
          script: |
            const fs = require('fs');
            const yaml = require('js-yaml');

            const prAuthor = context.payload.pull_request.user.login;
            const reviewer = context.payload.review.user.login;

            // Only block self-approval from reviewer bot accounts.
            // The human (nathanjohnpayne) IS the PR author under the shared
            // identity model, but must be allowed to approve for tiebreaker
            // and human-escalated reviews per REVIEW_POLICY.md.
            let reviewerAccounts;
            try {
              const config = yaml.load(fs.readFileSync('.github/review-policy.yml', 'utf8'));
              reviewerAccounts = config.available_reviewers || [];
            } catch (e) {
              reviewerAccounts = ['nathanpayne-claude', 'nathanpayne-codex', 'nathanpayne-cursor'];
            }

            // A reviewer bot account cannot approve a PR it authored.
            // Since all PRs are authored by nathanjohnpayne, this only fires
            // if a bot account somehow ends up as the PR author (shouldn't
            // happen under the policy, but guard against it).
            const isReviewerBot = reviewerAccounts.includes(reviewer);
            if (prAuthor === reviewer && isReviewerBot) {
              await github.rest.pulls.dismissReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                review_id: context.payload.review.id,
                message: 'Self-approval is not permitted. This review has been dismissed automatically.',
              });

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: ['policy-violation'],
              });

              core.setFailed('Self-approval detected and dismissed.');
            }

  # ──────────────────────────────────────────────
  # Job 6: Auto-merge on approval (if no external review required)
  # ──────────────────────────────────────────────
  # Must `needs:` on detect-disagreement, block-self-approval, and triage to
  # force those sibling jobs to COMPLETE before this one starts. All three
  # can apply blocking labels as a side effect (`needs-human-review` from
  # detect-disagreement, `policy-violation` from block-self-approval, and
  # `needs-external-review` from triage), and without the ordering
  # constraint they run in parallel with auto-merge. A sibling applying a
  # label 200ms after the runtime re-verify step below fetches labels but
  # 100ms before `gh pr merge` dispatches would still slip through.
  # `triage` matters specifically on the #495 synchronize/reopened re-arm
  # path: a PR changed after an approval, or while closed and then
  # reopened, must have `needs-external-review` re-applied by triage BEFORE
  # the re-verify step reads labels, or the re-arm would arm on a stale
  # snapshot. `always()` is still needed because event-mismatched sibling
  # jobs are expected to skip (`detect-disagreement` / `block-self-approval`
  # on pull_request events; `triage` on pull_request_review events). The
  # pull_request re-arm path additionally requires `needs.triage.result ==
  # 'success'`: ordering alone is not enough, because a failed/skipped triage
  # could otherwise leave the old no-label snapshot in place and still let
  # auto-merge arm. See #61 for the cross-event race and this PR for the
  # same-workflow races nathanpayne-codex caught during review.
  #
  # Three triggers arm auto-merge (#495, #620):
  #
  #   1. `pull_request_review` + `approved` — the original path. The
  #      approval event IS the signal, so no API approval re-check is
  #      needed.
  #   2. `pull_request` + `synchronize` / `reopened` — the RE-ARM path.
  #      Arming was one-shot on the approval event, so a fix-commit
  #      pushed AFTER an approval (the common case when Codex's 15–40+
  #      min review lands a finding at or after the author's approval —
  #      see #494) never re-attempted `gh pr merge --auto`, and the PR
  #      sat CLEAN-but-unmerged unless the author re-approved. This path
  #      re-runs the arming logic on every push, BUT only proceeds when
  #      the `Gate: require existing non-author approval` step below
  #      confirms a valid non-author latest-state APPROVED review already
  #      exists on the PR (`dismiss_stale_reviews` is OFF, so the
  #      approval carries across the fix-push — see the BEHIND-PR
  #      carryover behavior). A push with NO existing approval does NOT
  #      arm. Every other gate (coderabbit-wait, AUTHOR_MERGE_TOKEN
  #      identity, blocking-label re-verify) re-applies on the NEW HEAD,
  #      and `gh pr merge --auto` is idempotent when --auto is already
  #      enabled.
  #   3. `pull_request` + `unlabeled` for a BLOCKING label (#620) — the
  #      settle path. On an over-threshold PR with a carried-over
  #      approval, update-branch makes triage re-apply
  #      needs-external-review; the re-verify inside a concurrent arming
  #      run reads that transient state and hard-fails (correct in
  #      isolation — anti-#61); auto-clear then removes the label once
  #      the clearance gate passes on the new head — and nothing
  #      re-armed. The label REMOVAL is the state-settled signal, so it
  #      re-runs the same fully-gated arming logic: the approval gate
  #      re-confirms a registered non-author APPROVED via the API (same
  #      as path 2), and every downstream guard re-applies unchanged.
  #      The job `if:` additionally requires the REMOVED label to be one
  #      of the four blocking names (the full Label Gate blocking set,
  #      including policy-violation - Codex P2 on the #620 PR), so unrelated label churn does not spend
  #      runner minutes. triage deliberately does NOT run on `unlabeled`
  #      (its action filter excludes it — re-applying labels here would
  #      flap against auto-clear), so the triage-success requirement
  #      accepts `skipped` on this path: no sibling job can apply a
  #      label in an unlabeled run, and the two in-job label re-verifies
  #      still read the live API state fail-closed before any merge.
  #
  # The job body references only `github.event.pull_request.*` (number,
  # html_url, labels) — all trigger shapes carry that object — so the
  # steps are event-shape-agnostic. Only the `if:` and the approval-gate
  # step branch on event name.
  auto-merge-on-approval:
    needs: [load-config, detect-disagreement, block-self-approval, triage]
    if: >
      always() &&
      ((github.event_name == 'pull_request_review' &&
        github.event.review.state == 'approved') ||
       (github.event_name == 'pull_request' &&
        (github.event.action == 'synchronize' ||
         github.event.action == 'reopened' ||
         (github.event.action == 'unlabeled' &&
          contains(fromJSON('["needs-external-review","needs-human-review","policy-violation","human-hold"]'), github.event.label.name))))) &&
      (github.event_name != 'pull_request' ||
       needs.triage.result == 'success' ||
       (github.event.action == 'unlabeled' &&
        needs.triage.result == 'skipped')) &&
      !contains(github.event.pull_request.labels.*.name, 'needs-external-review') &&
      !contains(github.event.pull_request.labels.*.name, 'needs-human-review') &&
      !contains(github.event.pull_request.labels.*.name, 'human-hold')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Explicit-token gh merge path only, no authenticated git, so don't
          # leave the checkout token in .git/config (#548 / Codex #550).
          persist-credentials: false

      # Re-arm gate (#495). On the `synchronize` / `reopened` re-trigger
      # the approval is NOT in the event payload, so confirm via the API
      # that a valid non-author latest-state APPROVED review already
      # exists before arming. On the `pull_request_review` approved path
      # the approval IS the trigger, so this step is skipped and `proceed`
      # defaults to true for the downstream guard.
      #
      # Approval semantics mirror scripts/codex-review-check.sh gate (b)
      # and scripts/disagreement-detector.cjs: collapse to each reviewer's
      # LATEST opinionated review (APPROVED / CHANGES_REQUESTED /
      # DISMISSED; COMMENTED is informational), exclude the PR author
      # (GitHub blocks reviewer == author for native approval anyway), and
      # require that latest state to be APPROVED. A later
      # CHANGES_REQUESTED or DISMISSED from the same reviewer supersedes an
      # earlier APPROVED, so a withdrawn approval does NOT re-arm.
      - name: Gate require existing non-author approval
        id: require_approval
        if: >
          github.event_name == 'pull_request' ||
          github.event_name == 'pull_request_review'
        env:
          GH_TOKEN: ${{ secrets.REVIEWER_ASSIGNMENT_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPO: ${{ github.repository }}
          # #529 / #544: restrict the approval that arms auto-merge to a
          # REGISTERED agent reviewer identity (available_reviewers), matching
          # scripts/codex-review-check.sh gate (b) and the required
          # merge-clearance-gate. An APPROVED from an account that is NOT a
          # mapped reviewer identity must not arm auto-merge on EITHER path:
          # the synchronize re-arm (existing-review API check below) OR the
          # direct pull_request_review approved event. #544 review: the gate
          # previously ran only on pull_request, so a direct approval from an
          # unregistered non-author skipped it (the merge-clearance-gate still
          # backstopped the actual merge, but the arming gate should be
          # consistent on both paths).
          EVENT_REVIEWER: ${{ github.event.review.user.login }}
          REVIEWERS_JSON: ${{ needs.load-config.outputs.reviewers }}
        run: |
          REVIEWERS_JSON="${REVIEWERS_JSON:-[]}"
          # Direct approval event: the approval IS the trigger, so verify the
          # event reviewer is a registered, non-author reviewer here (#544).
          if [ "${GITHUB_EVENT_NAME:-}" = "pull_request_review" ]; then
            if [ -z "$EVENT_REVIEWER" ] || [ "$EVENT_REVIEWER" = "$PR_AUTHOR" ]; then
              echo "::notice::Approval reviewer '$EVENT_REVIEWER' is empty or the PR author; not arming auto-merge."
              echo "proceed=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if ! printf '%s' "$REVIEWERS_JSON" | jq -e --arg r "$EVENT_REVIEWER" 'index($r) != null' >/dev/null 2>&1; then
              echo "::notice::Approval reviewer '$EVENT_REVIEWER' is not a registered reviewer (available_reviewers); not arming auto-merge (#544)."
              echo "proceed=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Direct approval from registered reviewer $EVENT_REVIEWER; proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # --- synchronize / reopened re-arm path (existing API check) ---
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::notice::REVIEWER_ASSIGNMENT_TOKEN is not configured; cannot confirm an existing approval for the synchronize re-arm. Skipping auto-merge arming."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Fetch raw pages then flatten with `jq -s 'add // []'` BEFORE
          # aggregating. `gh api --paginate --jq` applies the filter per
          # page, so a `group_by` over a >30-review history (default page
          # size) would collapse each page in isolation and miss a later
          # CHANGES_REQUESTED on a subsequent page. Flatten first, then run
          # the latest-state-per-reviewer collapse over the full array.
          # Mirrors fetch_api_array() in scripts/codex-review-check.sh.
          if ! RAW=$(gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/reviews" 2>&1); then
            echo "::error::Could not read reviews to confirm an existing approval ($RAW). Failing closed — not arming auto-merge."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Latest opinionated review per non-author REGISTERED reviewer;
          # pass only when at least one such reviewer's latest state is
          # APPROVED. `-s` (slurp) merges the per-page arrays into one
          # list-of-arrays; `add // []` then flattens to the full review
          # array. #529: the `IN($reviewers[])` filter restricts to
          # available_reviewers identities — an approval from a non-reviewer
          # account does NOT count. Default to [] so an empty/failed
          # load-config fails CLOSED (no reviewer matches → no re-arm).
          REVIEWERS_JSON="${REVIEWERS_JSON:-[]}"
          if ! APPROVER=$(printf '%s' "$RAW" | jq -r -s \
            --arg author "$PR_AUTHOR" \
            --argjson reviewers "$REVIEWERS_JSON" '
              [ (add // []) | .[]
                | select(.state == "APPROVED" or .state == "CHANGES_REQUESTED" or .state == "DISMISSED")
                | select(.user.login != $author)
                | select(.user.login | IN($reviewers[]))
              ]
              | group_by(.user.login)
              | map(max_by(.submitted_at))
              | map(select(.state == "APPROVED"))
              | first
              | if . == null then "" else .user.login end' 2>/dev/null); then
            echo "::error::Could not parse review list to confirm an existing approval. Failing closed — not arming auto-merge."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$APPROVER" ]; then
            echo "::notice::No valid non-author APPROVED review from a registered reviewer (available_reviewers) on PR #$PR_NUMBER; a push does not arm auto-merge without one (#495/#529)."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Existing non-author approval found ($APPROVER); proceeding with the synchronize re-arm."
          echo "proceed=true" >> "$GITHUB_OUTPUT"

      - name: Check author merge token
        id: author_merge_token
        # Skip the entire merge path when the require_approval gate set
        # proceed=false — either the synchronize re-arm found no existing
        # registered-reviewer approval, or (since #544) the direct
        # pull_request_review approver was not a registered reviewer. The
        # `!= 'false'` test still lets a genuine registered-reviewer approval
        # (proceed=true) and any other event shape (empty) through.
        if: steps.require_approval.outputs.proceed != 'false'
        env:
          GH_TOKEN: ${{ secrets.AUTHOR_MERGE_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::notice::AUTHOR_MERGE_TOKEN is not configured; automatic PR merge is disabled. Merge manually as the author identity."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          expected_author=$(awk '
            /^[^[:space:]]/ && $1 == "author_identity:" {
              sub(/^[[:space:]]*[^:]+:[[:space:]]*/, "", $0)
              gsub(/^"/, "", $0)
              gsub(/^\047/, "", $0)
              gsub(/"[[:space:]]*(#.*)?$/, "", $0)
              gsub(/\047[[:space:]]*(#.*)?$/, "", $0)
              gsub(/[[:space:]]*#.*$/, "", $0)
              sub(/[[:space:]]+$/, "", $0)
              print
              exit
            }
          ' .github/review-policy.yml)
          expected_author="${expected_author:-nathanjohnpayne}"

          if ! actual_author=$(gh api user --jq .login); then
            echo "::error::AUTHOR_MERGE_TOKEN could not authenticate to GitHub. Refusing automatic merge."
            exit 1
          fi
          if [ "$actual_author" != "$expected_author" ]; then
            echo "::error::AUTHOR_MERGE_TOKEN resolves to '$actual_author', expected '$expected_author'. Refusing automatic merge."
            exit 1
          fi

          echo "Automatic merge token verified for author identity: $actual_author"
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Check if CodeRabbit is enabled
        if: steps.author_merge_token.outputs.enabled == 'true'
        id: cr
        run: |
          CONFIG=".github/review-policy.yml"
          # Parse only the `coderabbit:` block — stop at the next top-level key.
          # The previous `sed -n '/^coderabbit:/,$ p'` was scope-unsafe: it
          # captured everything from `coderabbit:` to EOF, so a later top-level
          # block with `enabled: true` (e.g., the `codex:` block added in #31)
          # produced a false positive and triggered the CodeRabbit wait loop.
          #
          # The end-of-block test is "a new line whose first character is
          # neither whitespace nor `#`" — which catches the next top-level YAML
          # key while still permitting column-0 comments (`# ...`) and blank
          # lines inside the block. The earlier `^[^[:space:]]` regex was
          # too strict: a YAML-valid column-0 comment prematurely exited the
          # block and produced a false negative. Fix surfaced by nathanpayne-codex
          # external review on PR #53.
          if awk '
            /^coderabbit:/ {in_block=1; next}
            in_block && /^[^[:space:]#]/ {in_block=0}
            in_block && /^[[:space:]]*enabled:[[:space:]]*true([[:space:]]*#.*)?$/ {found=1}
            END {exit found ? 0 : 1}
          ' "$CONFIG"; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for CodeRabbit review
        if: steps.author_merge_token.outputs.enabled == 'true' && steps.cr.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ secrets.REVIEWER_ASSIGNMENT_TOKEN }}
          # #489: author token for the rate-limit→Codex failover. coderabbit-wait.sh
          # runs as the reviewer (GH_TOKEN above) for its own retry comments, but its
          # failover posts the author-attributed `@codex review` via
          # codex-review-request.sh → gh-as-author.sh, which resolves the author token
          # from OP_PREFLIGHT_AUTHOR_PAT and verifies it as author_identity. This step
          # only runs when author_merge_token is enabled, so the secret is present;
          # preflight_require_token is a no-op here (GH_TOKEN is set), so this value is
          # not clobbered, and coderabbit-wait.sh itself reads only the reviewer PAT.
          OP_PREFLIGHT_AUTHOR_PAT: ${{ secrets.AUTHOR_MERGE_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Delegate to scripts/coderabbit-wait.sh so auto-merge honors the
          # same semantics the agent-driven flow uses: HEAD-anchored
          # freshness (#136 — do not merge on a stale review from a prior
          # HEAD), rate-limit retry (#138 — CodeRabbit does not auto-retry
          # after its published window elapses), and the coderabbit.*
          # knobs in .github/review-policy.yml. Exit-code translation:
          #   0 — cleared on current HEAD, no high-severity markers.
          #   2 — cleared but findings present (Potential issue / ⚠️).
          #       Blocks auto-merge per REVIEW_POLICY.md § Phase 2.5,
          #       which requires every Potential issue / ⚠️ finding to
          #       be explicitly addressed (fixed or dismissed with
          #       reasoning) before moving on. The agent-driven flow
          #       does that in-session; the auto-merge workflow has
          #       no way to address a finding, so it stops here and
          #       lets the author push a fix (or post a dismissal
          #       reply). A new approving review after the fix
          #       re-triggers this job.
          #   3 — API / infra error. Block and surface.
          #   4 — max_wait_seconds grace window elapsed without a review.
          #       CodeRabbit is advisory; log a warning and proceed.
          #   5 — rate-limit retry budget exhausted. Non-blocking IFF the #489
          #       Codex failover engaged (codex_failover_requested:true in the
          #       JSON) — Codex was requested, so the PR advances via the Codex
          #       gates; otherwise block and let the human intervene.
          # #727 post-clearance fast path. If the current HEAD already carries an
          # ACTUAL Codex/Phase-4b clearance AND a reviewer-identity APPROVED, the
          # real blocking bot-review signal is already in and CodeRabbit is
          # advisory on top of it — so cap coderabbit-wait.sh's poll budget to
          # coderabbit.post_clearance_max_wait_seconds instead of the full
          # max_wait_seconds. Read-only probe; fail SAFE — any non-zero rc leaves
          # the fast path DISARMED so the full budget is used.
          #
          # CODEX_REVIEW_CHECK_ALLOW_PHASE_4B_SUBSTITUTE=false is load-bearing
          # (#727, Codex P2 on #729): WITHOUT it, gate (c) accepts the same
          # reviewer APPROVED that clears gate (b) as a Phase-4b substitute, so an
          # ordinary under-threshold approval with NO Codex review would arm the
          # cap and reopen the pre-review merge race. With it, gate (c) requires
          # an actual Codex bot signal (👍 / affirmative verdict / clean review).
          # SKIP_CI keeps the probe independent of CI; REQUIRE_APPROVAL_ON_HEAD
          # HEAD-pins gate (b).
          #
          # PROBE_HEAD pins the clearance to the head we evaluated (#727, Codex P2
          # on #729): a push landing between here and coderabbit-wait.sh's own
          # head fetch would otherwise let the shortened budget apply to a head
          # that was never cleared. coderabbit-wait.sh disarms if its live head
          # differs from this SHA.
          PROBE_HEAD=$(gh api "repos/$REPO/pulls/$PR_NUMBER" --jq .head.sha 2>/dev/null || echo "")
          CODEX_CLEARED=false
          set +e
          CODEX_REVIEW_CHECK_SKIP_CI=1 CODEX_REVIEW_CHECK_REQUIRE_APPROVAL_ON_HEAD=1 \
            CODEX_REVIEW_CHECK_ALLOW_PHASE_4B_SUBSTITUTE=false \
            bash scripts/codex-review-check.sh "$PR_NUMBER" "$REPO" >&2
          crc=$?
          set -e
          case "$crc" in
            0)
              CODEX_CLEARED=true
              echo "::notice::Post-clearance fast path armed (#727): HEAD $PROBE_HEAD has an actual Codex/Phase-4b clearance + reviewer APPROVED — CodeRabbit wait capped to coderabbit.post_clearance_max_wait_seconds."
              ;;
            1)
              echo "::notice::Post-clearance fast path not armed: no actual Codex/Phase-4b clearance (or no reviewer APPROVED) on HEAD — using the full CodeRabbit budget."
              ;;
            *)
              echo "::warning::codex-review-check.sh returned rc=$crc while deriving post-clearance state; failing safe to the full CodeRabbit budget."
              ;;
          esac

          # Fail closed if the head could not be resolved (Codex P2 r-comment on
          # #729): without a non-empty PROBE_HEAD there is nothing to pin the
          # clearance to, so a push landing before coderabbit-wait.sh resolves
          # its own head could get the shortened budget on an un-reviewed head.
          # coderabbit-wait.sh also fails closed on an empty pin, but disarm here
          # too so the intent is explicit and logged.
          if [ "$CODEX_CLEARED" = "true" ] && [ -n "$PROBE_HEAD" ]; then
            POST_CLEARANCE_FLAG=1
          else
            POST_CLEARANCE_FLAG=0
            if [ "$CODEX_CLEARED" = "true" ] && [ -z "$PROBE_HEAD" ]; then
              echo "::warning::Post-clearance clearance derived but the head SHA could not be resolved for the pin — failing closed to the full CodeRabbit budget (#727)."
            fi
          fi

          set +e
          # Capture the helper's JSON (stdout) so the rc=5 branch can read the
          # #489 codex_failover_requested flag. Its human-readable diagnostics —
          # and the failover child's own JSON — go to stderr and stream to the log.
          WAIT_JSON=$(CODERABBIT_WAIT_POST_CLEARANCE="$POST_CLEARANCE_FLAG" CODERABBIT_WAIT_POST_CLEARANCE_SHA="$PROBE_HEAD" bash scripts/coderabbit-wait.sh "$PR_NUMBER" "$REPO")
          rc=$?
          set -e
          printf '%s\n' "$WAIT_JSON"
          case "$rc" in
            0)
              echo "CodeRabbit cleared on current HEAD — proceeding to merge."
              ;;
            2)
              echo "::error::CodeRabbit flagged Potential issue / ⚠️ findings on the current HEAD. Per REVIEW_POLICY.md § Phase 2.5, each must be explicitly addressed (fixed or dismissed with reasoning) before merge. Blocking auto-merge; address the findings and request a new approval to re-trigger."
              exit 1
              ;;
            4)
              echo "::warning::CodeRabbit grace window elapsed without a review. CodeRabbit is advisory — proceeding to merge. Check coderabbit-wait.sh JSON above for status_probe details, if present."
              ;;
            5)
              # #489/#713: a rate_limit_stalled is non-blocking ONLY when
              # the Codex failover engaged AND this head is protected from
              # bot-unreviewed auto-merge. Protection means either
              # merge-clearance-gate.sh's external arm applies
              # NON-vacuously, or the PR is intrinsically external-review
              # and current-head Codex/Phase-4b clearance is already
              # satisfied. For PRs where both are false, --trigger-only
              # does not wait for Codex, so proceeding would let a
              # rate-limited PR merge with neither bot having reviewed it —
              # those keep BLOCKING (Codex P2 on #512 r3). The disposition
              # lives in the unit-tested, fail-closed
              # scripts/coderabbit-automerge-rate-limit-gate.sh.
              #
              # #713: ask merge-clearance-gate.sh itself for the rc=5
              # protection predicate. It uses the same intrinsic threshold
              # + protected-paths computation as the required check, with
              # the label as a force-on signal and the propagation lane's
              # HEAD-pinned verified marker as the exemption, all evaluated
              # on the LIVE head. When the required-check gate is disabled,
              # it additionally requires codex-review-check.sh to confirm
              # current-head Codex/Phase-4b clearance before returning
              # true. Label-event proxies (current-label reads,
              # unlabeled-removal overrides) remain rejected: a label event
              # is not head-pinned proof of a downstream gate or clearance.
              # Fail closed: any nonzero exit or unexpected output from the
              # query reads as false (block). stderr streams to the step log
              # for diagnosability; only stdout (exactly `true` or `false`)
              # is consumed.
              ext_protected=false
              if req=$(bash scripts/merge-clearance-gate.sh --derive-rate-limit-protection "$PR_NUMBER" "$REPO"); then
                case "$req" in
                  true|false) ext_protected=$req ;;
                esac
              fi
              # #727: the post-clearance derivation above (CODEX_CLEARED) is the
              # threshold-INDEPENDENT counterpart of --derive-rate-limit-protection,
              # which only asserts protection when external review APPLIES (it
              # returns false for an under-threshold PR even when Codex has
              # cleared HEAD). A verified Codex/Phase-4b clearance + reviewer
              # APPROVED on HEAD is exactly the "a real bot reviewed this head"
              # signal the rate-limit gate protects against merging without — so
              # fold it in. This lets a rate-limit stall inside the shortened
              # post-clearance window resolve as advisory (proceed) rather than
              # blocking an already-cleared PR, matching the #489/#713 intent
              # that only bot-UNREVIEWED heads stay blocked.
              if [ "$CODEX_CLEARED" = "true" ]; then
                ext_protected=true
                echo "::notice::rc=5 protection folds in the #727 post-clearance signal: HEAD has verified Codex/Phase-4b clearance + reviewer APPROVED — the CodeRabbit rate-limit stall is advisory here."
              fi
              if bash scripts/coderabbit-automerge-rate-limit-gate.sh "$WAIT_JSON" "$ext_protected"; then
                echo "::notice::CodeRabbit rate-limited, but the #489 Codex failover engaged and this head has active or already-satisfied external-review protection — proceeding."
                # Record the downgrade for the final re-verify step: the
                # protection derivation is re-run there against the live
                # merge head, so state that changes during the waits (for
                # example, a push or propagation-lane verification landing)
                # aborts the merge.
                echo "CR_RATE_LIMIT_DOWNGRADED=true" >> "$GITHUB_ENV"
              else
                echo "::error::CodeRabbit rate-limit retry budget exhausted — blocking auto-merge. Either the failover did not engage, or this head has neither an active merge-clearance external gate nor already-satisfied Codex/Phase-4b clearance. Human must re-trigger or merge manually."
                exit 1
              fi
              ;;
            *)
              echo "::error::coderabbit-wait.sh failed with exit code $rc. Blocking auto-merge."
              exit 1
              ;;
          esac

      - name: Re-verify blocking labels before test wait
        if: steps.author_merge_token.outputs.enabled == 'true'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.AUTHOR_MERGE_TOKEN }}
        run: |
          # Guard against the TOCTOU race between the trigger-time label
          # snapshot and the actual merge. The job's top-level `if:` expression
          # evaluates labels from the `pull_request_review` event payload at
          # the moment GitHub Actions dispatched the event. Two things can
          # make that snapshot stale by the time we reach the merge step:
          #
          #   1. Eventual consistency. If a label is applied milliseconds
          #      before the review event fires, the event payload can still
          #      be generated without the label attached. Observed on PR #60
          #      (2026-04-14), where the `needs-external-review` label was
          #      applied 2 seconds before the review event but the job's
          #      `if:` check evaluated to true anyway, merging the PR before
          #      any external review could happen. See #61.
          #
          #   2. The "Wait for CodeRabbit review" step above can sleep for
          #      up to 5 minutes on a coderabbit-enabled repo. During that
          #      window, an agent can legitimately apply a blocking label
          #      (e.g., a human spotting something after approval) and the
          #      job would still merge because the `if:` already evaluated.
          #
          # Re-fetch the authoritative label state from the GitHub API before
          # entering the test wait. The same check repeats after the wait,
          # immediately before merge. Abort if any blocking label is now
          # present. Also check `policy-violation`, which is applied by the
          # block-self-approval job earlier in this same workflow run (and
          # again, the `if:` at job start wouldn't have seen it).
          LABELS=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json labels --jq '.labels[].name')
          printf 'Labels at merge time:\n%s\n' "$LABELS"
          for blocking_label in needs-external-review needs-human-review policy-violation human-hold; do
            if printf '%s\n' "$LABELS" | grep -Fxq "$blocking_label"; then
              echo "::error::Blocking label present at merge time: $blocking_label. Aborting auto-merge."
              exit 1
            fi
          done
          echo "No blocking labels present — proceeding to merge."


      - name: Require current-head check success
        if: steps.author_merge_token.outputs.enabled == 'true'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.AUTHOR_MERGE_TOKEN }}
          REPO: ${{ github.repository }}
          REQUIRED_HEAD_CHECK_NAME: lint
          TEST_CHECK_WAIT_SECONDS: 1200
          TEST_CHECK_POLL_SECONDS: 15
        run: |
          required_check_name=${REQUIRED_HEAD_CHECK_NAME:-lint}
          wait_seconds=${TEST_CHECK_WAIT_SECONDS:-1200}
          poll_seconds=${TEST_CHECK_POLL_SECONDS:-15}
          deadline=$((SECONDS + wait_seconds))
          pr_view_json=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefOid,isCrossRepository,baseRefName,headRefName)
          sha=$(echo "$pr_view_json" | jq -r .headRefOid)
