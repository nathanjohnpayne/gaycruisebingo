                    i += 1
                  elsif c == "["
                    j = i + 1
                    j += 1 while j < chars.length && chars[j] != "]"
                    tokens << chars[i..j].join
                    i = j + 1
                  elsif c == "+"
                    tokens << "+"
                    i += 1
                  else
                    tokens << Regexp.escape(c)
                    i += 1
                  end
