version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: "development"
      production-dependencies:
        dependency-type: "production"
    commit-message:
      prefix: "deps"
    # Hold breaking major upgrades that require a deliberate, manual migration
    # rather than an automated bump. These were bundled into the dev-dependencies
    # group PR (#255) and broke CI: TypeScript 7 is the preview native compiler,
    # plugin-react 6 removes Babel, and Vite 8 / Vitest 4 / jsdom 29 /
    # firebase-admin 14 each cross a major boundary. Dependabot still proposes
    # minor and patch updates for these packages; remove an entry here when we
    # are ready to adopt that major on purpose.
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "jsdom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "firebase-admin"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite-plugin-pwa"
        update-types: ["version-update:semver-major"]
